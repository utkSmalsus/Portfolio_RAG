# Run from this folder: docker compose up -d
# Then open http://localhost:3001
# Build context: parent folder (must contain portfolio Rag server + portfolio-rag-frontend)

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build:
      context: ..
      dockerfile: "portfolio Rag server/Dockerfile"
    ports:
      - "3001:3001"
    environment:
      QDRANT_URL: http://qdrant:6333
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY}
      HF_EMBEDDING_MODEL: ${HF_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      HF_CHAT_MODEL: ${HF_CHAT_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      HF_CHAT_PROVIDER: ${HF_CHAT_PROVIDER:-}
      PORT: 3001
    depends_on:
      - qdrant
    restart: on-failure

volumes:
  qdrant_data: {}
