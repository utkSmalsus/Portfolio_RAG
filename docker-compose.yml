services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./portfolio-rag-server
    container_name: portfolio-rag-server
    env_file:
      - ./portfolio-rag-server/.env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    build:
      context: ./portfolio-rag-frontend
    container_name: portfolio-rag-frontend
    environment:
      - VITE_PROXY_TARGET=http://backend:3001
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
volumes:
  qdrant_data: {}
