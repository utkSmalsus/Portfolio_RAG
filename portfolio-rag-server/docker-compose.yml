services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    restart: always

  backend:
    build: .
    container_name: portfolio-rag-server
    ports:
      - "3001:3001"
    environment:
      # Override to use the docker network hostname for qdrant
      - QDRANT_URL=http://qdrant:6333
    env_file:
      - .env
    depends_on:
      - qdrant
    restart: always
